<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>webgpu __EXAMPLE__</title>
    <style>
      :root {
        --viewport-width: 100vw;
        --viewport-height: 100vh;
      }

      html,
      body {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }

      canvas {
        display: block;
        width: var(--viewport-width) !important;
        height: var(--viewport-height) !important;
        max-width: 100vw;
        max-height: 100vh;
      }

      canvas:focus {
        outline: none;
      }

      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        background: #000;
        color: #f4f7fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        opacity: 1;
        transition:
          opacity 180ms ease,
          visibility 180ms ease;
      }

      #loading-screen.hidden {
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
      }

      .loading-content {
        display: grid;
        justify-items: center;
        gap: 16px;
      }

      .loading-spinner {
        width: 42px;
        height: 42px;
        border: 3px solid rgba(255, 255, 255, 0.18);
        border-top-color: #8db3ff;
        border-radius: 50%;
        animation: spin 900ms linear infinite;
      }

      .loading-label {
        color: #c7d0dd;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen" role="status" aria-live="polite">
      <div class="loading-content">
        <div class="loading-spinner" aria-hidden="true"></div>
        <div class="loading-label" id="loading-label">Loading WebGPU example...</div>
      </div>
    </div>
    <script type="module">
      import init from "./__EXAMPLE__.js?example=__EXAMPLE__";

      const root = document.documentElement;
      const loadingScreen = document.getElementById("loading-screen");
      const loadingLabel = document.getElementById("loading-label");

      const setLoadingLabel = (value) => {
        loadingLabel.textContent = value;
      };

      const hideLoadingScreen = () => {
        loadingScreen.classList.add("hidden");
        loadingScreen.setAttribute("aria-hidden", "true");
      };

      const hideLoadingWhenCanvasExists = () => {
        if (document.querySelector("canvas")) {
          hideLoadingScreen();
          return true;
        }

        return false;
      };

      const viewportSize = () => {
        const viewport = window.visualViewport;
        const width = Math.max(
          1,
          Math.round(
            viewport?.width ?? window.innerWidth ?? root.clientWidth ?? 1,
          ),
        );
        const height = Math.max(
          1,
          Math.round(
            viewport?.height ?? window.innerHeight ?? root.clientHeight ?? 1,
          ),
        );

        return { width, height };
      };

      const resizeCanvasToViewport = () => {
        const { width, height } = viewportSize();
        root.style.setProperty("--viewport-width", `${width}px`);
        root.style.setProperty("--viewport-height", `${height}px`);

        for (const canvas of document.querySelectorAll("canvas")) {
          canvas.style.width = `${width}px`;
          canvas.style.height = `${height}px`;
        }
      };

      let resizeFrame = 0;
      const scheduleResize = () => {
        cancelAnimationFrame(resizeFrame);
        resizeFrame = requestAnimationFrame(resizeCanvasToViewport);
      };

      resizeCanvasToViewport();
      window.addEventListener("resize", scheduleResize, { passive: true });
      window.visualViewport?.addEventListener("resize", scheduleResize, {
        passive: true,
      });
      window.visualViewport?.addEventListener("scroll", scheduleResize, {
        passive: true,
      });
      new MutationObserver(() => {
        scheduleResize();
        hideLoadingWhenCanvasExists();
      }).observe(document.body, {
        childList: true,
      });

      init()
        .then(() => {
          setLoadingLabel("Loading scene data...");
          resizeCanvasToViewport();
          hideLoadingWhenCanvasExists();
        })
        .catch((error) => {
          console.error(error);
          setLoadingLabel("Failed to load WebGPU example.");
        });
    </script>
  </body>
</html>
